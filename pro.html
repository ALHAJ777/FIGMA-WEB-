<!<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figma Prototype Showcase</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#128C7E;
    color:white;
    text-align:center;
    padding:40px;
}

header h1{
    margin-bottom:10px;
}

.container{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.card h2{
    margin-bottom:15px;
    color:#128C7E;
}

.card p{
    line-height:1.7;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    background:#128C7E;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:8px;
    margin-bottom:20px;
}

.btn:hover{
    opacity:0.9;
}

iframe{
    width:100%;
    height:650px;
    border:none;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
    <h1>My Figma Project</h1>
    <p>WhatsApp UI Design Prototype</p>
</header>

<div class="container">
    <div class="card">

        <h2>WhatsApp UI Design</h2>

        <p>
            This project showcases a WhatsApp-inspired user interface created in
            Figma. The design focuses on a clean layout, modern user experience,
            and intuitive navigation.
        </p>

        <a class="btn"
           href="https://www.figma.com/design/QvmBNyxcT7f7QPiOY1ehcc/WHATSAPP?node-id=0-1&t=kRlcCLVV0RbuyxZc-1"
           target="_blank">
           Open Figma Design
        </a>

        <iframe
        src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/design/QvmBNyxcT7f7QPiOY1ehcc/WHATSAPP?node-id=0-1&t=kRlcCLVV0RbuyxZc-1"
        allowfullscreen>
        </iframe>

    </div>
</div>

<footer>
    <p>Created using HTML, CSS and Figma</p>
</footer>

</body>
</html>
